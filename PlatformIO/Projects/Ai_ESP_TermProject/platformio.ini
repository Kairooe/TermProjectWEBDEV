; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform   = espressif32
board      = esp32doit-devkit-v1
framework  = arduino

monitor_speed = 115200
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
upload_speed  = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; ── Async networking (WiFiManager captive portal) ─────────────────────────
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/devyte/ESPAsyncDNSServer.git

    ; ── OLED — U8g2 (used by WiFiManager for provisioning screens) ────────────
    olikraus/U8g2 @ ^2.35.7

    ; ── OLED — Adafruit SSD1306 (used by game display module) ────────────────
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11

    ; ── JSON (Ollama API responses + backend POST body) ───────────────────────
    bblanchon/ArduinoJson @ ^6.21.0
